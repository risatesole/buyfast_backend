<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Producto</title>

    <style>
      :root {
        --bg: #f9f9f8;
        --surface: #ffffff;
        --border: #ebebea;
        --text: #1c1c1a;
        --muted: #8c8c89;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, "Helvetica Neue", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .main {
        padding: 26px 24px;
        max-width: 520px;
        margin: 0 auto;
      }

      /* HEADER */
      h2 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 14px;
      }

      /* CARD FORM */
      form {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 18px;
      }

      /* LABEL */
      label {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
      }

      /* INPUTS */
      input,
      textarea,
      select {
        width: 100%;
        margin-top: 4px;
        margin-bottom: 12px;
        padding: 7px 10px;
        border: 1px solid var(--border);
        border-radius: 5px;
        font-size: 13px;
        background: var(--bg);
        color: var(--text);
        outline: none;
        font-family: inherit;
      }

      textarea {
        resize: vertical;
        min-height: 80px;
      }

      /* BUTTON */
      button {
        margin-top: 6px;
        width: 100%;
        padding: 8px 12px;
        font-size: 12px;
        border-radius: 5px;
        border: none;
        cursor: pointer;
        background: var(--text);
        color: #fff;
      }

      /* MESSAGES */
      ul {
        list-style: none;
        margin-bottom: 12px;
      }

      li {
        font-size: 13px;
        padding: 6px 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 5px;
        margin-bottom: 6px;
      }
    </style>
  </head>

  <body>
    <div class="main">
      <h2>Crear Producto</h2>

      {% if messages %}
      <ul>
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %}

      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Nombre -->
        <label>Nombre</label>
        <input type="text" name="name" required />

        <!-- Descripción -->
        <label>Descripción</label>
        <textarea name="description" rows="4" required></textarea>

        <!-- Brand -->
        <label>Brand</label>
        <textarea name="brand" rows="4" required></textarea>

        <!-- Categoría (UNCHANGED) -->
        <label>Categoría</label>
        <select name="category" required>
          <option value="FRUITS_AND_VEGETABLES">Frutas y vegetales</option>
          <option value="LACTEOUS">Lácteos</option>
          <option value="GROCERY_AND_GOURMET">Grocery & Gourmet Food</option>
          <option value="ELECTRONIC_AND_TECH">Electronics & Tech</option>
          <option value="CLOTHING">Clothing</option>
          <option value="SHOES">Shoes</option>
          <option value="JEWELRY">Jewelry</option>
          <option value="HOME_AND_KITCHEN">Home & Kitchen</option>
          <option value="TOOLS_AND_HOME_IMPROVEMENT">
            Tools & Home Improvement
          </option>
          <option value="FURNITURE">Furniture</option>
          <option value="BOOKS">Books</option>
          <option value="VIDEO_GAMES">Video Games</option>
          <option value="MUSIC">Music</option>
          <option value="MOVIES_AND_TV">Movies & TV</option>
          <option value="BEAUTY_AND_PERSONAL_CARE">
            Beauty & Personal Care
          </option>
          <option value="HEALTH_AND_HOUSEHOLD">Health & Household</option>
          <option value="TOYS_AND_GAMES">Toys & Games</option>
          <option value="BABY_PRODUCTS">Baby Products</option>
          <option value="SPORTS_AND_OUTDOORS">Sports & Outdoors</option>
          <option value="AUTOMOTIVE">Automotive</option>
          <option value="PET_SUPPLIES">Pet Supplies</option>
          <option value="OFFICE_PRODUCTS">Office Products</option>
          <option value="INDUSTRIAL_AND_SCIENTIFIC">
            Industrial & Scientific
          </option>
        </select>

        <!-- Metric Unit -->
        <label>Metric Unit</label>
        <select name="metric_unit" required>
          <option value="UNIT">unit</option>
          <option value="PAIR">Pair</option>
          <option value="BOX">Box</option>
        </select>

        <!-- Status -->
        <label>Status</label>
        <select name="status" required>
          <option value="ACTIVE">active</option>
          <option value="DEACTIVATED">deactivated</option>
        </select>

        <!-- Price -->
        <label>Precio</label>
        <input type="number" step="0.01" name="price" required />

        <!-- Inventory -->
        <label>Initial existance inventory</label>
        <input type="number" name="initial_inventory_existance" required />

        <!-- Image -->
        <label>Imagen</label>
        <input type="file" name="image" />

        <button type="submit">Crear Producto</button>
      </form>
    </div>
  </body>
</html>
