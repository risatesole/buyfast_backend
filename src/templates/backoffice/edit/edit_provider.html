<!doctype html>
<html>
<head>
  <title>Edit Provider</title>

  <style>
:root {
  --bg: #f9f9f8;
  --surface: #ffffff;
  --border: #ebebea;
  --text: #1c1c1a;
  --muted: #8c8c89;
  --subtle: #c4c4c1;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

.main {
  display: flex;
  height: 100vh;
}

.content {
  flex: 1;
  padding: 26px 24px;
  overflow-y: auto;
}

/* HEADER */
.page-header {
  margin-bottom: 18px;
}

.page-header h1 {
  font-size: 16px;
  font-weight: 600;
}

.page-header p {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
}

/* CARD */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
}

.card-header {
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
}

/* FORM */
.form-body {
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.field label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
}

.field input,
.field textarea {
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 5px;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  outline: none;
}

.field textarea {
  min-height: 90px;
  resize: vertical;
}

/* BUTTON */
.actions {
  display: flex;
  justify-content: flex-end;
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}

.btn {
  padding: 6px 12px;
  font-size: 12px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
}

.btn-primary {
  background: var(--text);
  color: #fff;
}

.btn-primary:hover {
  opacity: 0.85;
}
  </style>
</head>

<body>

  <div class="main">
    <div class="content">

      <div class="page-header">
        <h1>Edit Provider</h1>
        <p>Update provider information</p>
      </div>

      <form method="POST">
        {% csrf_token %}

        <div class="card">
          <div class="card-header">Provider Info</div>

          <div class="form-body">

            <div class="field">
              <label>Name</label>
              <input type="text" name="name" value="{{ provider.name }}" required>
            </div>

            <div class="field">
              <label>Phone Number</label>
              <input type="text" name="phone_number" value="{{ provider.phone_number }}" required>
            </div>

            <div class="field">
              <label>Address</label>
              <input type="text" name="address" value="{{ provider.address }}" required>
            </div>

            <div class="field">
              <label>Email</label>
              <input type="email" name="email" value="{{ provider.email }}" required>
            </div>

            <div class="field">
              <label>Description</label>
              <textarea name="description">{{ provider.description }}</textarea>
            </div>

          </div>

          <div class="actions">
            <button type="submit" class="btn btn-primary">
              Update Provider
            </button>
          </div>

        </div>

      </form>

    </div>
  </div>

</body>
</html>
