<!doctype html>
<html>
<head>
  <title>Edit Employee</title>

  <style>
:root {
  --bg: #f9f9f8;
  --surface: #ffffff;
  --border: #ebebea;
  --text: #1c1c1a;
  --muted: #8c8c89;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
}

.main {
  padding: 26px 24px;
}

/* HEADER */
h2 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 14px;
}

/* ALERTS */
.alert {
  padding: 8px 10px;
  border-radius: 5px;
  margin-bottom: 10px;
  font-size: 13px;
  border: 1px solid var(--border);
  background: var(--surface);
}

/* CARD FORM */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 18px;
}

/* FIELD */
.mb-3 {
  margin-bottom: 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
}

input,
select {
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 5px;
  font-size: 13px;
  background: var(--bg);
  outline: none;
  color: var(--text);
}

/* BUTTONS */
.actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.btn {
  padding: 6px 12px;
  font-size: 12px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
}

.btn-primary {
  background: var(--text);
  color: #fff;
}

.btn-secondary {
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
}
  </style>
</head>

<body>

<div class="main">

  <h2>Edit Employee</h2>

  <!-- Messages -->
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <form method="POST" class="card">
    {% csrf_token %}

    <div class="mb-3">
      <label>Email</label>
      <input type="email" name="email" value="{{ employee.user.email }}" required>
    </div>

    <div class="mb-3">
      <label>First Name</label>
      <input type="text" name="first_name" value="{{ employee.user.first_name }}">
    </div>

    <div class="mb-3">
      <label>Last Name</label>
      <input type="text" name="last_name" value="{{ employee.user.last_name }}">
    </div>

    <div class="mb-3">
      <label>Position</label>
      <select name="position">
        {% for value, label in positions %}
          <option value="{{ value }}"
            {% if employee.position == value %}selected{% endif %}>
            {{ label }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-3">
      <label>Role</label>
      <input type="text" name="role" value="{{ employee.user.role }}">
    </div>

    <div class="actions">
      <button type="submit" class="btn btn-primary">
        Save Changes
      </button>

      <a href="{% url 'backoffice' %}" class="btn btn-secondary">
        Cancel
      </a>
    </div>

  </form>

</div>

</body>
</html>
