<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electronics — SHOP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0f0f0f;
    --gray-50: #f9f9f8;
    --gray-100: #f2f2f0;
    --gray-200: #e5e5e2;
    --gray-400: #9b9b96;
    --gray-600: #5f5f5a;
    --white: #ffffff;
    --radius-md: 10px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --font: 'DM Sans', sans-serif;
    --font-serif: 'DM Serif Display', serif;
    --shadow-hover: 0 2px 8px rgba(0,0,0,0.08), 0 8px 32px rgba(0,0,0,0.08);
  }

  body {
    font-family: var(--font);
    background: var(--white);
    color: var(--black);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--white); border-bottom: 1px solid var(--gray-200);
    padding: 0 24px; display: flex; align-items: center; gap: 20px; height: 60px;
  }
  .nav-logo { font-family: var(--font-serif); font-size: 22px; letter-spacing: -0.5px; color: var(--black); text-decoration: none; flex-shrink: 0; }
  .nav-search {
    flex: 1; max-width: 480px; display: flex; align-items: center;
    border: 1.5px solid var(--gray-200); border-radius: var(--radius-xl);
    background: var(--gray-50); padding: 0 16px; gap: 10px;
    transition: border-color 0.2s, background 0.2s;
  }
  .nav-search:focus-within { border-color: var(--black); background: var(--white); }
  .nav-search svg { flex-shrink: 0; opacity: 0.4; }
  .nav-search input { border: none; background: transparent; outline: none; font-family: var(--font); font-size: 14px; color: var(--black); width: 100%; height: 40px; }
  .nav-search input::placeholder { color: var(--gray-400); }
  .nav-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .nav-btn {
    display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: var(--radius-xl);
    font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer;
    border: 1.5px solid transparent; color: var(--black); transition: all 0.15s; background: transparent; text-decoration: none;
  }
  .nav-btn:hover { background: var(--gray-50); border-color: var(--gray-200); }
  .nav-btn.primary { background: var(--black); color: var(--white); border-color: var(--black); }
  .nav-btn.primary:hover { background: #2a2a2a; }
  .cart-badge { background: var(--black); color: var(--white); font-size: 10px; font-weight: 600; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

  /* DELIVERY BAR */
  .delivery-bar { background: var(--gray-50); border-bottom: 1px solid var(--gray-200); padding: 0 24px; display: flex; align-items: center; height: 38px; font-size: 12px; color: var(--gray-600); }
  .delivery-bar strong { color: var(--black); font-weight: 500; }

  /* PAGE HEADER */
  .page-header { padding: 22px 24px 0; display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--gray-400); margin-bottom: 5px; }
  .breadcrumb a { color: var(--gray-400); text-decoration: none; }
  .breadcrumb a:hover { color: var(--black); }
  .page-title { font-family: var(--font-serif); font-size: 28px; letter-spacing: -0.3px; }
  .result-count { font-size: 13px; color: var(--gray-400); padding-bottom: 4px; }

  /* FILTER ROW */
  .filter-row { padding: 16px 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .type-chip {
    padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--gray-200);
    background: var(--gray-50); font-family: var(--font); font-size: 13px; font-weight: 500;
    color: var(--gray-600); cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .type-chip:hover { border-color: var(--black); color: var(--black); background: var(--white); }
  .type-chip.active { background: var(--black); color: var(--white); border-color: var(--black); }
  .divider-v { width: 1px; height: 22px; background: var(--gray-200); }
  .sort-select {
    border: 1.5px solid var(--gray-200); border-radius: var(--radius-md);
    padding: 7px 28px 7px 12px; font-family: var(--font); font-size: 13px;
    background: var(--gray-50); color: var(--black); outline: none; cursor: pointer; appearance: none; margin-left: auto;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239b9b96' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 10px center; transition: border-color 0.15s;
  }
  .sort-select:focus { border-color: var(--black); }

  /* PRODUCT GRID */
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; padding: 0 24px 52px; }

  .product-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: all 0.2s; position: relative; }
  .product-card:hover { border-color: var(--gray-400); box-shadow: var(--shadow-hover); transform: translateY(-2px); }

  .product-img-wrap { background: var(--gray-50); padding: 24px; display: flex; align-items: center; justify-content: center; height: 190px; position: relative; }
  .product-img-wrap img { width: 100%; height: 100%; object-fit: contain; max-height: 140px; }

  .product-badge { position: absolute; top: 10px; left: 10px; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 20px; background: var(--black); color: var(--white); }
  .product-badge.sale { background: #c0392b; }

  .product-wish { position: absolute; top: 10px; right: 10px; width: 28px; height: 28px; border-radius: 50%; background: var(--white); border: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: center; font-size: 13px; opacity: 0; transition: opacity 0.15s; cursor: pointer; }
  .product-card:hover .product-wish, .product-wish.liked { opacity: 1; }

  .product-info { padding: 14px 16px 16px; }
  .product-meta { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--gray-400); margin-bottom: 3px; }
  .product-name { font-size: 13.5px; font-weight: 500; line-height: 1.35; margin-bottom: 8px; color: var(--black); }
  .product-rating { display: flex; align-items: center; gap: 5px; margin-bottom: 10px; }
  .stars { color: #e8a020; font-size: 11px; }
  .rating-count { font-size: 11px; color: var(--gray-400); }
  .product-price { display: flex; align-items: baseline; gap: 7px; margin-bottom: 12px; }
  .price-current { font-size: 16px; font-weight: 600; }
  .price-old { font-size: 12px; color: var(--gray-400); text-decoration: line-through; }
  .price-off { font-size: 11px; color: #c0392b; font-weight: 600; }
  .product-add { width: 100%; padding: 9px; background: transparent; border: 1.5px solid var(--gray-200); border-radius: var(--radius-md); font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; color: var(--black); transition: all 0.15s; }
  .product-add:hover { background: var(--black); border-color: var(--black); color: var(--white); }

  /* EMPTY */
  .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 0; color: var(--gray-400); }
  .empty-state p { font-size: 14px; margin-top: 10px; }

  /* CART DRAWER */
  .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .cart-overlay.open { opacity: 1; pointer-events: all; }
  .cart-drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 380px; background: var(--white); z-index: 201; padding: 24px; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); display: flex; flex-direction: column; border-left: 1px solid var(--gray-200); box-shadow: -4px 0 24px rgba(0,0,0,0.06); }
  .cart-drawer.open { transform: translateX(0); }
  .cart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .cart-header h3 { font-size: 18px; font-weight: 600; }
  .cart-close { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--gray-200); background: transparent; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; }
  .cart-items { flex: 1; overflow-y: auto; }
  .cart-item { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--gray-100); }
  .cart-item img { width: 56px; height: 56px; object-fit: contain; background: var(--gray-50); border-radius: var(--radius-md); padding: 6px; flex-shrink: 0; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; line-height: 1.3; }
  .cart-item-price { font-size: 14px; font-weight: 600; }
  .cart-qty { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .qty-btn { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--gray-200); background: transparent; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; font-family: var(--font); }
  .qty-btn:hover { background: var(--gray-100); }
  .cart-footer { padding-top: 18px; border-top: 1px solid var(--gray-200); }
  .cart-total { display: flex; justify-content: space-between; font-size: 15px; font-weight: 600; margin-bottom: 14px; }
  .checkout-btn { width: 100%; padding: 13px; background: var(--black); color: var(--white); border: none; border-radius: var(--radius-xl); font-family: var(--font); font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .checkout-btn:hover { background: #2a2a2a; }
  .cart-empty { text-align: center; padding: 60px 0; color: var(--gray-400); font-size: 14px; }
  .cart-empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--black); color: var(--white); padding: 11px 22px; border-radius: var(--radius-xl); font-size: 13px; font-weight: 500; z-index: 300; transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* FOOTER */
  footer { border-top: 1px solid var(--gray-200); background: var(--gray-50); padding: 28px 24px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--gray-400); flex-wrap: wrap; gap: 12px; }
  .footer-pay { display: flex; gap: 8px; }
  .pay-badge { border: 1px solid var(--gray-200); border-radius: 4px; padding: 3px 8px; font-size: 11px; font-weight: 600; background: var(--white); color: var(--gray-600); }

  @media (max-width: 600px) {
    nav { padding: 0 14px; }
    .page-header, .filter-row, .product-grid { padding-left: 14px; padding-right: 14px; }
    .product-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); }
    .cart-drawer { width: 100%; }
    .sort-select { margin-left: 0; width: 100%; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">SHOP</a>
  <div class="nav-search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Search electronics…" id="searchInput">
  </div>
  <div class="nav-actions">
    <button class="nav-btn" onclick="toggleCart()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Cart <div class="cart-badge" id="cartCount">0</div>
    </button>
    <button class="nav-btn primary">Sign in</button>
  </div>
</nav>

<div class="delivery-bar">Welcome to <strong>&nbsp;SHOP</strong></div>

<div class="page-header">
  <div>
    <div class="breadcrumb">
      <a href="#">Home</a>
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      Electronics
    </div>
    <h1 class="page-title">Electronics</h1>
  </div>
  <span class="result-count" id="resultCount"></span>
</div>

<div class="filter-row">
  <button class="type-chip active" onclick="setType('all', this)">All</button>
  <button class="type-chip" onclick="setType('laptop', this)">Laptops</button>
  <button class="type-chip" onclick="setType('desktop', this)">Desktops</button>
  <button class="type-chip" onclick="setType('phone', this)">Phones</button>
  <div class="divider-v"></div>
  <select class="sort-select" id="sortSelect" onchange="render()">
    <option value="default">Featured</option>
    <option value="priceLow">Price: Low → High</option>
    <option value="priceHigh">Price: High → Low</option>
    <option value="rating">Top Rated</option>
  </select>
</div>

<div class="product-grid" id="productGrid"></div>

<footer>
  <div>© 2025 SHOP. All rights reserved.</div>
  <div class="footer-pay">
    <div class="pay-badge">VISA</div><div class="pay-badge">MC</div>
    <div class="pay-badge">AMEX</div><div class="pay-badge">PayPal</div>
  </div>
</footer>

<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h3>Your cart</h3>
    <button class="cart-close" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-total"><span>Total</span><span id="cartTotal">$0.00</span></div>
    <button class="checkout-btn">Proceed to checkout →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Flat list — as returned from a DB query filtered by category = 'electronics'
const products = [
  { id:1,  name:'MacBook Air M3 13"',          brand:'Apple',     type:'laptop',  price:1099.00, old:null,     rating:4.9, reviews:4230,  img:'https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=300&h=300&fit=crop', badge:'New' },
  { id:2,  name:'Galaxy S24 Ultra 256GB',       brand:'Samsung',   type:'phone',   price:1099.99, old:1199.99,  rating:4.6, reviews:8420,  img:'https://images.unsplash.com/photo-1610945415295-d9bbf067e59c?w=300&h=300&fit=crop', badge:'Sale' },
  { id:3,  name:'Dell XPS 15 Intel i7',         brand:'Dell',      type:'laptop',  price:1349.00, old:1599.00,  rating:4.5, reviews:1870,  img:'https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=300&h=300&fit=crop', badge:'Sale' },
  { id:4,  name:'iPhone 15 Pro 128GB',          brand:'Apple',     type:'phone',   price:999.00,  old:null,     rating:4.8, reviews:11200, img:'https://images.unsplash.com/photo-1696426191236-d6d8ef19d0b7?w=300&h=300&fit=crop', badge:null },
  { id:5,  name:'Mac Mini M4 Pro',              brand:'Apple',     type:'desktop', price:1399.00, old:null,     rating:4.9, reviews:980,   img:'https://images.unsplash.com/photo-1610465299993-e6675c9f9efa?w=300&h=300&fit=crop', badge:'New' },
  { id:6,  name:'ThinkPad X1 Carbon Gen 12',   brand:'Lenovo',    type:'laptop',  price:1249.99, old:1499.99,  rating:4.7, reviews:3100,  img:'https://images.unsplash.com/photo-1525547719571-a2d4ac8945e2?w=300&h=300&fit=crop', badge:'Sale' },
  { id:7,  name:'Galaxy Z Fold 5',             brand:'Samsung',   type:'phone',   price:1799.99, old:1899.99,  rating:4.5, reviews:2340,  img:'https://images.unsplash.com/photo-1610945264803-c22b62d2a7b3?w=300&h=300&fit=crop', badge:'Sale' },
  { id:8,  name:'HP Spectre x360 14"',         brand:'HP',        type:'laptop',  price:1299.99, old:null,     rating:4.6, reviews:1560,  img:'https://images.unsplash.com/photo-1611078489935-0cb964de46d6?w=300&h=300&fit=crop', badge:null },
  { id:9,  name:'iMac 24" M4 8-core',          brand:'Apple',     type:'desktop', price:1299.00, old:null,     rating:4.8, reviews:2100,  img:'https://images.unsplash.com/photo-1547082299-de196ea013d6?w=300&h=300&fit=crop', badge:null },
  { id:10, name:'Pixel 8 Pro 128GB',           brand:'Google',    type:'phone',   price:799.00,  old:999.00,   rating:4.6, reviews:3870,  img:'https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=300&h=300&fit=crop', badge:'Sale' },
  { id:11, name:'ASUS ROG Strix G16 Gaming',   brand:'ASUS',      type:'laptop',  price:1499.99, old:1799.99,  rating:4.5, reviews:980,   img:'https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=300&h=300&fit=crop', badge:'Sale' },
  { id:12, name:'Alienware Aurora R16',        brand:'Dell',      type:'desktop', price:1899.99, old:2199.99,  rating:4.4, reviews:760,   img:'https://images.unsplash.com/photo-1587831990711-23ca6441447b?w=300&h=300&fit=crop', badge:'Sale' },
  { id:13, name:'OnePlus 12 256GB',            brand:'OnePlus',   type:'phone',   price:699.99,  old:799.99,   rating:4.5, reviews:2100,  img:'https://images.unsplash.com/photo-1585060544812-6b45742d762f?w=300&h=300&fit=crop', badge:'Sale' },
  { id:14, name:'Surface Pro 9 i5 256GB',      brand:'Microsoft', type:'laptop',  price:999.99,  old:null,     rating:4.4, reviews:1340,  img:'https://images.unsplash.com/photo-1544731612-de7f96afe55f?w=300&h=300&fit=crop', badge:null },
  { id:15, name:'HP ENVY Desktop TE02',        brand:'HP',        type:'desktop', price:849.99,  old:1099.99,  rating:4.3, reviews:580,   img:'https://images.unsplash.com/photo-1593640408182-31c228b78b5b?w=300&h=300&fit=crop', badge:'Sale' },
  { id:16, name:'Xiaomi 14 Ultra 512GB',       brand:'Xiaomi',    type:'phone',   price:899.99,  old:null,     rating:4.6, reviews:1450,  img:'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=300&h=300&fit=crop', badge:'New' },
];

let cart = [];
let currentType = 'all';
let liked = new Set();
const typeLabel = { laptop:'Laptop', desktop:'Desktop', phone:'Smartphone' };

function getList() {
  let list = currentType === 'all' ? [...products] : products.filter(p => p.type === currentType);
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (q) list = list.filter(p => p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q));
  const sort = document.getElementById('sortSelect').value;
  if (sort === 'priceLow')  list.sort((a,b) => a.price - b.price);
  if (sort === 'priceHigh') list.sort((a,b) => b.price - a.price);
  if (sort === 'rating')    list.sort((a,b) => b.rating - a.rating);
  return list;
}

function stars(r) {
  let s = '';
  for (let i = 1; i <= 5; i++) s += i <= Math.floor(r) ? '★' : (i - r < 1 ? '½' : '☆');
  return s;
}

function render() {
  const list = getList();
  document.getElementById('resultCount').textContent = `${list.length} product${list.length !== 1 ? 's' : ''}`;
  const grid = document.getElementById('productGrid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><div style="font-size:36px">📦</div><p>No products found.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(p => {
    const off = p.old ? Math.round((1 - p.price / p.old) * 100) : null;
    const isLiked = liked.has(p.id);
    return `
    <div class="product-card">
      <div class="product-img-wrap">
        <img src="${p.img}&q=80" alt="${p.name}" loading="lazy">
        ${p.badge ? `<div class="product-badge ${p.badge === 'Sale' ? 'sale' : ''}">${p.badge}</div>` : ''}
        <div class="product-wish ${isLiked ? 'liked' : ''}" onclick="toggleLike(${p.id}, this)">${isLiked ? '♥' : '♡'}</div>
      </div>
      <div class="product-info">
        <div class="product-meta">${p.brand} · ${typeLabel[p.type]}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-rating">
          <span class="stars">${stars(p.rating)}</span>
          <span class="rating-count">${p.reviews.toLocaleString()}</span>
        </div>
        <div class="product-price">
          <span class="price-current">$${p.price.toFixed(2)}</span>
          ${p.old ? `<span class="price-old">$${p.old.toFixed(2)}</span><span class="price-off">${off}% off</span>` : ''}
        </div>
        <button class="product-add" onclick="addToCart(${p.id})">Add to cart</button>
      </div>
    </div>`;
  }).join('');
}

function setType(type, el) {
  currentType = type;
  document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function toggleLike(id, el) {
  if (liked.has(id)) { liked.delete(id); el.textContent = '♡'; el.classList.remove('liked'); }
  else { liked.add(id); el.textContent = '♥'; el.classList.add('liked'); showToast('Added to wishlist'); }
}

function addToCart(id) {
  const p = products.find(x => x.id === id);
  const ex = cart.find(x => x.id === id);
  if (ex) ex.qty++; else cart.push({...p, qty:1});
  updateCart();
  showToast('Added to cart');
}

function updateCart() {
  const count = cart.reduce((a,x) => a + x.qty, 0);
  document.getElementById('cartCount').textContent = count;
  const items = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');
  if (!cart.length) {
    items.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛍</div>Your cart is empty</div>`;
    footer.style.display = 'none';
  } else {
    items.innerHTML = cart.map(item => `
      <div class="cart-item">
        <img src="${item.img}&w=120&h=120&fit=crop" alt="${item.name}">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">$${(item.price * item.qty).toFixed(2)}</div>
          <div class="cart-qty">
            <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
            <span>${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
          </div>
        </div>
      </div>`).join('');
    document.getElementById('cartTotal').textContent = `$${cart.reduce((a,x) => a + x.price*x.qty, 0).toFixed(2)}`;
    footer.style.display = 'block';
  }
}

function changeQty(id, delta) {
  const idx = cart.findIndex(x => x.id === id);
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  updateCart();
}

function toggleCart() {
  document.getElementById('cartDrawer').classList.toggle('open');
  document.getElementById('cartOverlay').classList.toggle('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

document.getElementById('searchInput').addEventListener('input', render);
render();
updateCart();
</script>
</body>
</html>
