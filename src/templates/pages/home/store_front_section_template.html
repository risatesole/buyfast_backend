<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title> section_title — SHOP</title>
</head>

<body>

  <nav>
    <a class="nav-logo" href="#">SHOP</a>

    <div class="nav-search">
      <input type="text" placeholder="Search {{ section_title|lower }}…" id="searchInput">
    </div>

    <div class="nav-actions">
      <button class="nav-btn">Cart</button>
      <button class="nav-btn primary">Sign in</button>
    </div>
  </nav>

  <div class="delivery-bar">
    Welcome to <strong>{{ section_title }}</strong>
  </div>

  <div class="page-header">
    <div class="breadcrumb">
      Home › {{ section_title }}
    </div>
    <h1 class="page-title">{{ section_title }}</h1>
  </div>

  <div class="product-grid" id="grid"></div>

</body>

</html>
