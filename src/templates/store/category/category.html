<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{{category}} — {{storename}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet">
  <style>
    /* SAME BASE STYLES */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --black: #0f0f0f;
      --gray-50: #f9f9f8;
      --gray-100: #f2f2f0;
      --gray-200: #e5e5e2;
      --gray-400: #9b9b96;
      --gray-600: #5f5f5a;
      --white: #ffffff;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --font: 'DM Sans', system-ui;
      --font-serif: 'DM Serif Display';
      --shadow-hover: 0 2px 8px rgba(0, 0, 0, 0.08), 0 8px 32px rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: var(--font);
      background: #fff;
      color: #0f0f0f
    }

    nav {
      position: sticky;
      top: 0;
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center
    }

    .nav-logo {
      font-family: var(--font-serif);
      font-size: 22px;
      text-decoration: none;
      color: #000
    }

    /* HEADER */
    .page-header {
      padding: 32px 24px 12px;
      border-bottom: 1px solid var(--gray-200)
    }

    .breadcrumb {
      font-size: 12px;
      color: var(--gray-400)
    }

    .page-title {
      font-family: var(--font-serif);
      font-size: 34px
    }

    /* PRODUCT GRID */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      padding: 24px;
    }

    .product-card {
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: 0.2s;
    }

    .product-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      border-color: #000;
    }

    .product-img {
      aspect-ratio: 1;
      background: var(--gray-100);
    }

    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-info {
      padding: 10px
    }

    .product-name {
      font-size: 13px;
      font-weight: 500
    }

    .product-price {
      font-size: 13px;
      color: #000;
      margin-top: 4px
    }
  </style>
</head>

<body>

  <nav>
    <a href="/" class="nav-logo">{{storename}}</a>
  </nav>

  <div class="page-header">
    <div class="breadcrumb">Home › {{category}}</div>
    <h1 class="page-title">{{category}}</h1>
  </div>
<div class="product-grid">

  {% for product in products %}
    <a href="/product/{{ product.id }}" class="product-card">
      <div class="product-img">
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
      </div>

      <div class="product-info">
        <div class="product-name">{{ product.name }}</div>

        <div class="product-price">
          {% if product.prices.all %}
            ${{ product.prices.first.value }}
          {% else %}
            No price
          {% endif %}
        </div>
      </div>
    </a>

  {% empty %}
    <div class="no-products">
      There are no products available in this category.
    </div>
  {% endfor %}

</div>
</body>

</html>
